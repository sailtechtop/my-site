  <script>
    let currentIndex = 8;
    const increment = 8;
    let currentFilteredPosts = [];

    function renderArticles(isAppend = false) {
      const container = document.querySelector('.article-grid');
      const loadMoreBtn = document.getElementById('load-more-container');
      if (!container) return;

      if (!isAppend) {
        container.innerHTML = "";
        currentIndex = 8;
      }

      const itemsToShow = currentFilteredPosts.slice(isAppend ? currentIndex - increment : 0, currentIndex);

      const html = itemsToShow.map(post => {
        let previewText = "";

        if (post.description && post.description.includes('<div')) {
          previewText = '德国号码 + 德国原生流量 + 德区应用环境，国行手机数字出海全链路实操方案实测。';
        } else {
          previewText = post.description || '暂无简介';
        }

        return `
        <article class="card p-4 md:p-4 flex flex-col gap-3 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="tag">${post.category}</span>
            <span class="text-dim uppercase text-[11px] md:text-[12px] font-mono">${post.date}</span>
          </div>

          <div class="flex-1 min-w-0">
            <h3 class="font-display font-semibold text-text mb-2 text-[16px] md:text-[18px] leading-snug break-words">${post.title}</h3>
            <p class="text-dim text-[14px] md:text-[15px] line-clamp-2 leading-6">${previewText}</p>
          </div>

          <div class="iframe-wrap mb-2">
            <iframe src="https://www.youtube.com/embed/${post.youtubeId}" loading="lazy" allowfullscreen></iframe>
          </div>

          <div class="flex items-center justify-between gap-3">
            <div class="flex gap-1.5 flex-wrap min-w-0">
              ${post.tags ? post.tags.map(tag => `<span class="tag" style="background:rgba(108,182,255,0.05);">${tag}</span>`).join('') : ''}
            </div>

            <a href="details.html?id=${post.youtubeId}" class="arrow-btn" title="查看视频说明">
              <i class="fas fa-arrow-right"></i>
            </a>
          </div>
        </article>`;
      }).join('');

      container.insertAdjacentHTML('beforeend', html);

      if (loadMoreBtn) {
        loadMoreBtn.style.display = (currentIndex >= currentFilteredPosts.length) ? 'none' : 'flex';
      }
    }

    function renderHotPosts() {
      const hotContainer = document.getElementById('hot-posts-container');
      if (!hotContainer || typeof posts === 'undefined') return;

      hotContainer.innerHTML = posts.slice(0, 4).map((post, i) => `
        <div class="flex gap-3 items-start group cursor-pointer py-1" onclick="window.location.href='details.html?id=${post.youtubeId}'">
          <span class="font-display text-accentDim group-hover:text-accent shrink-0 text-[15px] md:text-[18px] leading-none mt-[2px]">0${i + 1}</span>
          <span class="text-dim group-hover:text-text text-[13px] md:text-[14px] leading-[1.45] line-clamp-2">${post.title}</span>
        </div>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (typeof posts !== 'undefined' && Array.isArray(posts)) {
        currentFilteredPosts = [...posts];
        renderArticles();
        renderHotPosts();
      } else {
        console.error('data.js 加载失败或格式错误');
      }

      document.getElementById('load-more-btn')?.addEventListener('click', () => {
        currentIndex += increment;
        renderArticles(true);
      });

      document.querySelectorAll('.nav-filter').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();

          let cat = link.tagName === 'A' ? link.innerText.trim() : (link.querySelector('span')?.innerText.trim() || '');
          let filterCat = (cat === '港美股/加密货币') ? '港美股&加密货币' : cat;

          currentFilteredPosts = (filterCat === '首页' || filterCat === '小帆船' || !filterCat)
            ? [...posts]
            : posts.filter(p => p.category === filterCat);

          renderArticles(false);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });
    });
  </script>
