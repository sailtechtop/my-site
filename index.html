<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Syne:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0b111a',
            surface: '#141c27',
            border: '#243244',
            borderHover: '#3a5475',
            accent: '#6cb6ff',
            accentSoft: '#9fd0ff',
            accentDim: '#1c436e',
            text: '#e6eef8',
            dim: '#a4b4c8',
            muted: '#7d8ea5',
            success: '#7dd3fc'
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
            display: ['Syne', 'sans-serif']
          }
        }
      }
    }
  </script>

  <style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  :root {
    --bg: #0b111a;
    --bg-grid: rgba(108,182,255,0.04);
    --surface: rgba(20, 28, 39, 0.94);
    --surface-soft: rgba(255, 255, 255, 0.015);
    --border: #243244;
    --border-soft: rgba(108,182,255,0.10);
    --border-strong: #3a5475;
    --accent: #6cb6ff;
    --accent-soft: #9fd0ff;
    --accent-dim: #1c436e;
    --text: #e6eef8;
    --dim: #a4b4c8;
    --muted: #7d8ea5;
    --shadow: rgba(0,0,0,0.28);
    --nav-bg: rgba(11, 17, 26, 0.78);
    --tag-bg: rgba(108,182,255,0.10);
    --tag-border: rgba(108,182,255,0.18);
    --tag-soft-bg: rgba(108,182,255,0.05);
    --arrow-bg: rgba(108,182,255,0.05);
    --arrow-border: rgba(108,182,255,0.18);
    --bar-bg: rgba(108,182,255,0.10);
    --card-hover-ring: rgba(108,182,255,0.07);
    --divider: #1b2532;
    --tool-bg: rgba(30, 41, 59, 0.20);
    --tool-border: rgba(51, 65, 85, 0.95);
    --input-pill: rgba(108,182,255,0.14);
  }

  body.light-theme {
  --bg: #f5f8fc;
  --bg-grid: rgba(80,110,160,0.06);
  --surface: rgba(255, 255, 255, 0.96);
  --surface-soft: rgba(80,110,160,0.05);
  --border: #d8e2ef;
  --border-soft: rgba(80,110,160,0.16);
  --border-strong: #aebfd4;
  --accent: #2f7de1;
  --accent-soft: #2f7de1;
  --accent-dim: #5f86b8;
  --text: #182536;
  --dim: #3f536b;
  --muted: #60748d;
  --shadow: rgba(20,40,70,0.10);
  --nav-bg: rgba(245, 248, 252, 0.88);
  --tag-bg: rgba(47,125,225,0.10);
  --tag-border: rgba(47,125,225,0.18);
  --tag-soft-bg: rgba(47,125,225,0.06);
  --arrow-bg: rgba(47,125,225,0.06);
  --arrow-border: rgba(47,125,225,0.18);
  --bar-bg: rgba(47,125,225,0.14);
  --card-hover-ring: rgba(47,125,225,0.08);
  --divider: #e2eaf3;
  --tool-bg: rgba(255,255,255,0.96);
  --tool-border: #d7e1ec;
  --input-pill: rgba(47,125,225,0.12);
}

  body {
    margin: 0;
    background-color: var(--bg);
    background-image:
      linear-gradient(var(--bg-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
    background-size: 40px 40px;
    font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    transition: background-color .25s ease, color .25s ease;
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

  .nav-blur {
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    background: var(--nav-bg);
    border-bottom: 1px solid var(--border-soft);
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
  }

  .nav-shell {
    max-width: 1400px;
    margin: 0 auto;
    min-height: 76px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 24px;
    padding: 0 18px;
  }

  .brand-mark {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    min-width: 120px;
    flex-shrink: 0;
  }

  .brand-logo-wrap {
    width: 34px;
    height: 34px;
    border-radius: 999px;
    padding: 2px;
    background: linear-gradient(135deg, var(--accent), #244a76);
    box-shadow: 0 0 0 1px var(--border-soft);
    flex-shrink: 0;
  }

  .brand-logo {
    width: 100%;
    height: 100%;
    border-radius: 999px;
    object-fit: contain;
    background: var(--bg);
    padding: 3px;
  }

  .brand-text {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--text);
    white-space: nowrap;
  }

  .top-nav-scroll {
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    display: flex;
    justify-content: center;
    min-width: 0;
  }

  .top-nav-scroll::-webkit-scrollbar { display: none; }

  .top-nav-frame {
    display: inline-flex;
    align-items: center;
    padding: 6px;
    border-radius: 999px;
    border: 1px solid var(--border-soft);
    background: var(--surface-soft);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
  }

  .top-nav-list {
    min-width: max-content;
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 auto;
    padding: 0;
    list-style: none;
  }

  .nav-link {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 40px;
    padding: 0 14px;
    border-radius: 999px;
    color: var(--dim);
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.22s ease;
    white-space: nowrap;
  }

  .nav-link:hover {
    color: var(--text);
    background: var(--tag-soft-bg);
  }

  .nav-link.is-active {
    color: var(--text);
    background: var(--input-pill);
    box-shadow: inset 0 0 0 1px var(--tag-border);
  }

  .nav-link.is-active::after {
    content: "";
    position: absolute;
    left: 12px;
    right: 12px;
    bottom: 6px;
    height: 2px;
    border-radius: 999px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .theme-toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 40px;
    padding: 0 14px;
    border-radius: 999px;
    border: 1px solid var(--border-soft);
    background: var(--surface-soft);
    color: var(--dim);
    cursor: pointer;
    transition: all .2s ease;
    font-size: 14px;
    font-weight: 600;
  }

  .theme-toggle:hover {
    color: var(--text);
    border-color: var(--tag-border);
    background: var(--tag-soft-bg);
  }

  .page-wrap {
    max-width: 1400px;
    margin: 0 auto;
    padding: 100px 16px 48px;
  }

  .layout-grid {
    display: grid;
    grid-template-columns: minmax(0, 2.2fr) minmax(0, 7.2fr) minmax(0, 2.6fr);
    gap: 20px;
    align-items: start;
  }

  .left-col, .right-col {
    position: sticky;
    top: 96px;
  }

  .article-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }

  .card, .widget {
    background: var(--surface);
    border: 1px solid var(--border);
    transition: all .25s ease;
  }

  .card {
    border-radius: 16px;
  }

  .widget {
    border-radius: 16px;
    padding: 20px;
  }

  .card:hover {
    border-color: var(--border-strong);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px var(--shadow), 0 0 0 1px var(--card-hover-ring);
  }

  .widget-title {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    font-family: JetBrains Mono, monospace;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    background: var(--tag-bg);
    border: 1px solid var(--tag-border);
    border-radius: 999px;
    color: var(--accent-soft);
    font-size: 12px;
    padding: 5px 10px;
    line-height: 1;
    white-space: nowrap;
  }

  .tag-soft {
    background: var(--tag-soft-bg);
    border-color: var(--tag-border);
    color: var(--dim);
  }

  .arrow-btn {
    width: 34px;
    height: 34px;
    border: 1px solid var(--arrow-border);
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dim);
    background: var(--arrow-bg);
    font-size: 14px;
    transition: all .2s ease;
    flex-shrink: 0;
  }

  .card:hover .arrow-btn {
    background: var(--tag-bg);
    border-color: var(--accent);
    color: var(--accent);
    transform: translateX(2px);
  }

  .cat-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--divider);
    font-size: 15px;
    color: var(--dim);
    cursor: pointer;
    transition: color 0.2s ease;
  }

  .cat-item:last-child { border-bottom: none; }
  .cat-item:hover { color: var(--text); }

  .bar {
    background: var(--bar-bg);
    border-radius: 999px;
    overflow: hidden;
  }

  .bar-fill {
    background: linear-gradient(90deg, var(--accent-dim), var(--accent));
    border-radius: 999px;
    height: 100%;
    transition: width 1s ease;
  }

  .avatar-ring {
    background: conic-gradient(var(--accent) 0, #244a76 60%, var(--accent) 100%);
    border-radius: 999px;
    padding: 2px;
  }

  .avatar-inner {
    background: var(--bg);
    border-radius: 999px;
    padding: 3px;
  }

  .line-clamp-1,
  .line-clamp-2,
  .line-clamp-3 {
    display: -webkit-box;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .line-clamp-1 { -webkit-line-clamp: 1; }
  .line-clamp-2 { -webkit-line-clamp: 2; }
  .line-clamp-3 { -webkit-line-clamp: 3; }

  .tabular-nums {
    font-variant-numeric: tabular-nums;
  }

  @media (min-width: 768px) {
    .article-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (min-width: 1200px) {
    .nav-shell { min-height: 86px; gap: 28px; }
    .top-nav-frame { padding: 8px; }
    .top-nav-list { gap: 10px; }
    .nav-link { height: 48px; padding: 0 20px; font-size: 20px; font-weight: 600; }
    .brand-text { font-size: 18px; }
    .brand-logo-wrap { width: 38px; height: 38px; }
    .theme-toggle { height: 46px; padding: 0 16px; }
  }

  @media (max-width: 1279px) {
    .layout-grid { grid-template-columns: minmax(0, 1fr); }
    .left-col, .right-col { position: static; top: auto; }
    .left-col { order: 1; }
    main { order: 2; }
    .right-col { order: 3; }
  }

  @media (max-width: 900px) {
    .nav-shell {
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 10px 12px;
      min-height: auto;
    }
    .brand-mark { justify-self: start; }
    .top-nav-scroll { justify-content: flex-start; }
    .top-nav-frame { padding: 4px; }
    .top-nav-list { margin: 0; padding-bottom: 2px; }
    .nav-link { height: 36px; padding: 0 12px; font-size: 14px; }
    .theme-toggle { width: fit-content; }
  }

  @media (max-width: 767px) {
    .page-wrap { padding: 108px 12px 36px; }
    .widget { padding: 16px; border-radius: 14px; }
    .card { border-radius: 14px; }
    .tag { font-size: 12px; padding: 5px 9px; }
    .arrow-btn { width: 32px; height: 32px; font-size: 13px; }
    .cat-item { font-size: 14px; padding: 9px 0; }
    .brand-text { font-size: 15px; }
  }
  body.light-theme .widget-title {
    color: #6b7f96;
  }

  body.light-theme .tag {
    color: #2e5f9b;
  }

  body.light-theme .tag-soft {
    color: #4a6078;
  }

  body.light-theme .arrow-btn {
    color: #4a6078;
  }

  body.light-theme .theme-toggle {
    color: #3f536b;
  }
  body.light-theme .card h3,
body.light-theme .card h2,
body.light-theme .card .card-title {
  color: #1b2a3a !important;
}

body.light-theme .card p,
body.light-theme .card .text-dim,
body.light-theme .card .text-muted {
  color: #52657d !important;
}

body.light-theme .card .line-clamp-2,
body.light-theme .card .line-clamp-3 {
  color: #1b2a3a !important;
}

body.light-theme .card .tabular-nums,
body.light-theme .card time,
body.light-theme .card .meta-text {
  color: #6a7d94 !important;
}
body.light-theme .widget p,
body.light-theme .widget li,
body.light-theme .widget a,
body.light-theme .widget span {
  color: #52657d !important;
}

body.light-theme .widget .tabular-nums,
body.light-theme .widget strong,
body.light-theme .widget b {
  color: #2b3d52 !important;
}
body.light-theme .widget .cat-item,
body.light-theme .widget .hot-post-item {
  color: #52657d !important;
}
</style>
</head>

                <span class="text-accent text-[14px] md:text-[15px]">24%</span>

              <div class="bar h-2"><div class="bar-fill" style="width:12%"></div></div>

        <div class="widget">
          <div class="widget-title opacity-60 flex items-center gap-2">
            <img src="logo.jpg" alt="logo" class="w-4 h-4 rounded-full object-cover" onerror="this.style.display='none'" />

          <div class="grid grid-cols-2 gap-3 mt-4">

            <a href="https://whoer.net" target="_blank" rel="noopener noreferrer" class="flex flex-col items-center justify-center py-4 md:py-5 px-2 rounded-xl bg-slate-800/20 border border-slate-800 hover:border-purple-500/50 hover:bg-slate-800/40 transition-all group text-center">
              <i class="fas fa-user-secret text-purple-400 text-xl md:text-2xl mb-2 md:mb-3"></i>

            </a>

            <a href="https://www.xe.com/currencyconverter" target="_blank" rel="noopener noreferrer" class="flex flex-col items-center justify-center py-4 md:py-5 px-2 rounded-xl bg-slate-800/20 border border-slate-800 hover:border-yellow-500/50 hover:bg-slate-800/40 transition-all group text-center">
              <i class="fas fa-comments-dollar text-yellow-400 text-xl md:text-2xl mb-2 md:mb-3"></i>
              <span class="text-[13px] md:text-[14px] text-slate-200 group-hover:text-white font-bold">实时汇率</span>
            </a>

            <a href="https://browserleaks.com" target="_blank" rel="noopener noreferrer" class="flex flex-col items-center justify-center py-4 md:py-5 px-2 rounded-xl bg-slate-800/20 border border-slate-800 hover:border-emerald-500/50 hover:bg-slate-800/40 transition-all group text-center">
              <i class="fas fa-fingerprint text-emerald-400 text-xl md:text-2xl mb-2 md:mb-3"></i>
              <span class="text-[13px] md:text-[14px] text-slate-200 group-hover:text-white font-bold">指纹检测</span>
            </a>

      </aside>

  <script src="data.js?v=20260510-1"></script>
<script>
  let currentIndex = 8;
  const increment = 8;
  let currentFilteredPosts = [];
    function applyTheme(theme) {
    const body = document.body;
    const btnText = document.getElementById('theme-toggle-text');
    const btnIcon = document.querySelector('#theme-toggle i');

    if (theme === 'light') {
      body.classList.add('light-theme');
      if (btnText) btnText.textContent = '浅色';
      if (btnIcon) btnIcon.className = 'fas fa-sun';
    } else {
      body.classList.remove('light-theme');
      if (btnText) btnText.textContent = '深色';
      if (btnIcon) btnIcon.className = 'fas fa-moon';
    }

    localStorage.setItem('site-theme', theme);
  }

  function initTheme() {
    const savedTheme = localStorage.getItem('site-theme') || 'dark';
    applyTheme(savedTheme);

    document.getElementById('theme-toggle')?.addEventListener('click', () => {
      const isLight = document.body.classList.contains('light-theme');
      applyTheme(isLight ? 'dark' : 'light');
    });
  }
  function formatCategoryLabel(cat) {
    const text = (cat || '').trim();

    const map = {
      '机场&VPS': '机场/VPS',
      '机场/VPS': '机场/VPS',
      'VPS': '机场/VPS',

      '手机&eSIM': '手机/eSIM',
      '手机/eSIM': '手机/eSIM',
      'eSIM': '手机/eSIM',

      '银行&券商&交易所': '银行/券商/交易所',
      '银行/券商/交易所': '银行/券商/交易所',

      '港美股&加密货币': '港美股/加密货币',
      '港美股/加密货币': '港美股/加密货币',

      '工具': '各类工具',
      '各类工具': '各类工具'
    };

    return map[text] || text || '未分类';
  }

  function normalizeCategory(cat) {
    return (cat || '').replace(/\s+/g, '').trim();
  }

  function categoryAliases(text) {
    const map = {
      '首页': '',
      '机场/VPS': ['机场/VPS', '机场&VPS', 'VPS'],
      '手机/eSIM': ['手机/eSIM', '手机&eSIM', 'eSIM'],
      '银行/券商/交易所': ['银行/券商/交易所', '银行&券商&交易所'],
      '港美股/加密货币': ['港美股/加密货币', '港美股&加密货币'],
      '各类工具': ['各类工具', '工具']
    };
    return map[text] || [text];
  }

  function setActiveNav(categoryText) {
    document.querySelectorAll('.nav-link').forEach(link => {
      const text = link.innerText.trim();
      const active = categoryText ? text === categoryText : text === '首页';
      link.classList.toggle('is-active', active);
    });
  }

  function getPreviewText(post) {
    if (post.summary && String(post.summary).trim()) return String(post.summary).trim();
    if (!post.description) return '';

    const temp = document.createElement('div');
    temp.innerHTML = post.description;
    const text = (temp.textContent || temp.innerText || '').replace(/\s+/g, ' ').trim();
    return text.slice(0, 80);
  }

  function getTags(post) {
    if (!Array.isArray(post.tags)) return [];
    return post.tags.filter(Boolean).slice(0, 3);
  }

  function renderArticles(isAppend = false) {
    const container = document.getElementById('article-grid');
    const loadMoreWrap = document.getElementById('load-more-container');
    if (!container) return;

    if (!isAppend) {
      container.innerHTML = '';
      currentIndex = 8;
    }

    const start = isAppend ? currentIndex - increment : 0;
    const itemsToShow = currentFilteredPosts.slice(start, currentIndex);

    const html = itemsToShow.map(post => {
      const tags = getTags(post).slice(0, 3);

      return `
        <article
          class="card p-4 md:p-4 flex flex-col h-full min-w-0 cursor-pointer"
          onclick="window.open('details.html?id=${post.youtubeId}', '_blank')"
        >
          <div class="flex items-center gap-2 flex-wrap mb-3">
            <span class="tag">${formatCategoryLabel(post.category)}</span>
            <span class="text-dim text-[11px] md:text-[12px] font-mono tabular-nums tracking-[0.02em]">${post.date || ''}</span>
          </div>

          <div class="mb-4 min-w-0">
            <h3 class="font-semibold text-text text-[18px] md:text-[20px] leading-[1.4] line-clamp-2 break-words min-h-[2.8em]">
              ${post.title || ''}
            </h3>
          </div>

          <div class="block relative overflow-hidden rounded-xl aspect-video bg-black/20 border border-[#223247] mb-3">
            <img
              src="https://img.youtube.com/vi/${post.youtubeId}/mqdefault.jpg"
              alt="${(post.title || '').replace(/"/g, '&quot;')}"
              class="w-full h-full object-cover transition-transform duration-500 hover:scale-105"
              loading="lazy"
            />
            <div class="absolute inset-0 flex items-center justify-center bg-black/10 hover:bg-black/30 transition-colors">
              <div class="w-11 h-11 flex items-center justify-center rounded-full bg-red-600/90 text-white shadow-lg">
                <svg fill="currentColor" viewBox="0 0 24 24" class="w-5 h-5 ml-[2px]">
                  <path d="M8 5v14l11-7z"></path>
                </svg>
              </div>
            </div>
          </div>

          <div class="mt-auto flex items-end justify-between gap-3">
            <div class="flex gap-1.5 flex-wrap min-w-0">
              ${tags.map(tag => `<span class="tag tag-soft">${tag}</span>`).join('')}
            </div>
            <div class="arrow-btn">
              <i class="fas fa-arrow-right"></i>
            </div>
          </div>
        </article>
      `;
    }).join('');

    container.insertAdjacentHTML('beforeend', html);

    if (loadMoreWrap) {
      loadMoreWrap.style.display = currentIndex >= currentFilteredPosts.length ? 'none' : 'flex';
    }
  }

  function renderHotPosts() {
    const hotContainer = document.getElementById('hot-posts-container');
    if (!hotContainer || typeof posts === 'undefined') return;

    hotContainer.innerHTML = posts.slice(0, 4).map((post, i) => `
      <div
        class="flex gap-3 items-start group cursor-pointer py-1"
        onclick="window.open('details.html?id=${post.youtubeId}', '_blank')"
      >
        <span class="font-mono text-accent/80 group-hover:text-accent shrink-0 text-[15px] md:text-[17px] font-semibold leading-none mt-[1px] tabular-nums">
          ${String(i + 1).padStart(2, '0')}
        </span>
        <span class="text-dim group-hover:text-text text-[13px] md:text-[14px] leading-[1.45] line-clamp-2">
          ${post.title || ''}
        </span>
      </div>
    `).join('');
  }

  function applyFilter(categoryText) {
    const aliases = categoryAliases(categoryText).map(normalizeCategory);

    if (!categoryText || categoryText === '首页') {
      currentFilteredPosts = [...posts];
    } else {
      currentFilteredPosts = posts.filter(p => aliases.includes(normalizeCategory(p.category)));
    }

    renderArticles(false);
    setActiveNav(categoryText || '首页');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  document.addEventListener('DOMContentLoaded', () => {
  initTheme();

  if (typeof posts !== 'undefined' && Array.isArray(posts)) {
    currentFilteredPosts = [...posts];
    renderArticles(false);
    renderHotPosts();
    setActiveNav('首页');
  } else {
    console.error('data.js 未正确加载');
  }

    document.getElementById('load-more-btn')?.addEventListener('click', () => {
      currentIndex += increment;
      renderArticles(true);
    });

    document.querySelectorAll('.nav-filter').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        const text = link.innerText.trim();
        applyFilter(text);
      });
    });
  });
</script>
</body>
